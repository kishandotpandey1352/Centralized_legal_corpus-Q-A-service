name: Eval Gates

concurrency:
  group: eval-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - backend/**
      - mvp/**
      - .github/workflows/eval-gates.yml
      - README.md
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "both"
        type: choice
        options:
          - smoke
          - full
          - both
      api_base_url:
        description: "FastAPI base URL (must be reachable by runner)"
        required: true
        default: "http://localhost:8000"
      smoke_runs:
        description: "Number of repeated smoke runs"
        required: true
        default: "3"
      full_runs:
        description: "Number of repeated full runs"
        required: true
        default: "2"

jobs:
  smoke-pr:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.suite == 'smoke' || github.event.inputs.suite == 'both')) }}
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ github.event.inputs.api_base_url || 'http://localhost:8000' }}
      SMOKE_RUNS: ${{ github.event.inputs.smoke_runs || '3' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Repeated smoke runs (variance gate)
        run: >-
          python scripts/eval_series.py
          --api-base-url "${{ env.API_BASE_URL }}"
          --cases ../mvp/golden_set_smoke.json
          --baseline ../mvp/experiments/baseline_metrics.json
          --output-dir ../mvp/experiments/pr_smoke
          --runs "${{ env.SMOKE_RUNS }}"
          --answer-timeout-seconds 20
          --summary-timeout-seconds 40
          --max-retries 1
          --stop-on-failure
          --require-winner-rate 0.60
          --require-passing-rate 1.00

      - name: Upload PR smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts-pr-smoke
          path: |
            mvp/experiments/pr_smoke/run_*.json
            mvp/experiments/pr_smoke/run_*.md
            mvp/experiments/pr_smoke/series_latest.json
          retention-days: 14
          if-no-files-found: error

  full-nightly:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.suite == 'full' || github.event.inputs.suite == 'both')) }}
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ github.event.inputs.api_base_url || 'http://localhost:8000' }}
      FULL_RUNS: ${{ github.event.inputs.full_runs || '2' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Repeated full runs (nightly gate)
        run: >-
          python scripts/eval_series.py
          --api-base-url "${{ env.API_BASE_URL }}"
          --cases ../mvp/golden_set_template.json
          --baseline ../mvp/experiments/baseline_metrics.json
          --output-dir ../mvp/experiments/nightly_full
          --runs "${{ env.FULL_RUNS }}"
          --answer-timeout-seconds 25
          --summary-timeout-seconds 90
          --max-retries 2
          --stop-on-failure
          --require-winner-rate 0.70
          --require-passing-rate 1.00

      - name: Find latest full run artifact
        id: latest_run
        run: |
          python - <<'PY'
          from pathlib import Path
          root = Path("../mvp/experiments/nightly_full")
          runs = sorted(root.glob("run_*.json"), key=lambda p: p.stat().st_mtime)
          if not runs:
              raise SystemExit("No run artifacts found")
          latest = runs[-1]
          with Path("$GITHUB_OUTPUT").open("a", encoding="utf-8") as fh:
              fh.write(f"run_json={latest.as_posix()}\n")
          print(f"latest run: {latest}")
          PY

      - name: Enforce promotion policy (non-destructive)
        run: >-
          python scripts/promote_baseline.py
          --run-json "${{ steps.latest_run.outputs.run_json }}"
          --runs-dir ../mvp/experiments/nightly_full
          --require-consecutive-live-runs 2
          --check-only

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts-nightly-full
          path: |
            mvp/experiments/nightly_full/run_*.json
            mvp/experiments/nightly_full/run_*.md
            mvp/experiments/nightly_full/series_latest.json
          retention-days: 30
          if-no-files-found: error
