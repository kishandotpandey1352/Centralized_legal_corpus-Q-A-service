<section class="panel">
  <h2>Answer With Citations</h2>
  <div class="form-grid">
    <label>
      Question
      <textarea
        rows="3"
        [ngModel]="form().question"
        (ngModelChange)="updateField('question', $event)"
        placeholder="What is the cure period before termination for material breach?"
        data-testid="answer-input"
      ></textarea>
    </label>

    <label>
      Top K
      <input
        type="number"
        min="1"
        max="20"
        [ngModel]="form().top_k"
        (ngModelChange)="updateField('top_k', $event)"
      />
    </label>

    <label>
      Source File (optional)
      <input
        type="text"
        [ngModel]="form().source_file"
        (ngModelChange)="updateField('source_file', $event)"
        placeholder="sample_service_agreement.txt"
      />
    </label>

    <label>
      Document Type (optional)
      <input
        type="text"
        [ngModel]="form().document_type"
        (ngModelChange)="updateField('document_type', $event)"
        placeholder="txt"
      />
    </label>

    <label>
      Candidate Pool Size
      <input
        type="number"
        min="1"
        max="100"
        [ngModel]="form().candidate_pool_size"
        (ngModelChange)="updateField('candidate_pool_size', $event)"
      />
    </label>

    <label class="toggle">
      <input
        type="checkbox"
        [ngModel]="form().rerank"
        (ngModelChange)="updateField('rerank', $event)"
      />
      Enable rerank
    </label>
  </div>

  <button type="button" class="primary" (click)="run()" [disabled]="loading()" data-testid="answer-run-button">
    {{ loading() ? 'Running...' : 'Run Answer' }}
  </button>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  @if (result(); as response) {
    <div class="two-column">
      <section class="surface" data-testid="answer-surface">
        <h3>Answer</h3>
        <p class="answer-text" data-testid="answer-text">{{ response.answer }}</p>
      </section>

      <app-citation-inspector [citations]="response.citations"></app-citation-inspector>
    </div>
  }
</section>
